{% extends 'staff/base.html' %}
{% load static %}
{% block title %}Compose Message{% endblock %}

{% block content %}
    <link rel="stylesheet" href="{% static 'staff/send_staff_message.css' %}">


<div class="wrap">
    <nav class="topbar">
        <a href="{% url 'staff:dashboard' %}" class="brand">
            <div class="brand-dot"><svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 100 20A10 10 0 0012 2zm1 13h-2v-2h2v2zm0-4h-2V7h2v4z"/></svg></div>
            MediCore
        </a>
        <a href="{% url 'staff:staff_messages' %}" class="back">
            <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg> Messages
        </a>
    </nav>

    <div class="hero">
        <div class="hero-eyebrow">Staff</div>
        <h1>Compose Message</h1>
        <p>Signed in as {{ request.user.get_full_name|default:request.user.username }}</p>
    </div>

    <div class="body">
        <div class="card">
            <form method="POST">
                {% csrf_token %}

                <div class="field">
                    <label for="recipient_id">To</label>
                    <select id="recipient_id" name="recipient_id" required>
                        <option value="" disabled selected>Select a recipient…</option>
                        {% for member in staff_members %}
                        <option value="{{ member.id }}"
                            data-name="{{ member.user.get_full_name|default:member.user.username }}"
                            data-role="{{ member.role|default:'' }}"
                            {% if posted.recipient_id == member.id|stringformat:"s" %}selected{% endif %}>
                            {{ member.user.get_full_name|default:member.user.username }}{% if member.role %} — {{ member.role|capfirst }}{% endif %}
                        </option>
                        {% endfor %}
                    </select>
                    <div class="recipient-preview" id="recipient-preview">
                        <div class="rp-avatar" id="rp-avatar"></div>
                        <div>
                            <div class="rp-name" id="rp-name"></div>
                            <div class="rp-role" id="rp-role"></div>
                        </div>
                    </div>
                </div>

                <div class="field">
                    <label for="message_content">Message</label>
                    <textarea id="message_content" name="message_content"
                              placeholder="Write your message here…"
                              maxlength="2000"
                              required>{{ posted.message_content|default:'' }}</textarea>
                    <div class="char-count"><span id="char-count">0</span> / 2000</div>
                </div>

                <div class="form-actions">
                    <a href="{% url 'staff:staff_messages' %}" class="btn-cancel">Cancel</a>
                    <button type="submit" class="btn-send">
                        <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                        Send Message
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // Character counter
    const ta = document.getElementById('message_content');
    const counter = document.getElementById('char-count');
    function updateCount() { counter.textContent = ta.value.length; }
    ta.addEventListener('input', updateCount);
    updateCount();

    // Recipient preview card
    const sel     = document.getElementById('recipient_id');
    const preview = document.getElementById('recipient-preview');
    const avatar  = document.getElementById('rp-avatar');
    const nameEl  = document.getElementById('rp-name');
    const roleEl  = document.getElementById('rp-role');

    function updatePreview() {
        const opt = sel.options[sel.selectedIndex];
        if (!opt || !opt.value) { preview.classList.remove('visible'); return; }
        const name = opt.dataset.name || '';
        const role = opt.dataset.role || '';
        avatar.textContent = name.trim().charAt(0).toUpperCase();
        nameEl.textContent = name;
        roleEl.textContent = role ? role.charAt(0).toUpperCase() + role.slice(1) : 'Staff';
        preview.classList.add('visible');
    }
    sel.addEventListener('change', updatePreview);
    updatePreview();
</script>
{% endblock %}
